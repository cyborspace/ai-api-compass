services:
  - type: web
    name: ai-api-compass-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: ai-api-compass-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-api-compass-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://ai-api-compass.vercel.app
    healthCheckPath: /health

  - type: redis
    name: ai-api-compass-redis
    ipAllowList: []
    plan: free

databases:
  - name: ai-api-compass-db
    plan: free
    databaseName: ai_api_compass
    user: ai_api_compass
